- title: "Do Front-of-Package Sugar Labels Shift Consumer Demand away from Diabetes-Risk Foods"
  authors: ["Eric Ayamga"]
  year: 2025
  status: "working paper"
  venue: ""
  pdf: ""
  link: "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5784502"
  abstract: "This paper evaluates the impact of a U.S. front-of-package (FOP) sugar labeling policy on consumer demand for ready-to-eat (RTE) cereals. Using NielsenIQ retail scanner data and a difference-in-differences design, we find no evidence of product reformulation or significant demand shifts around the 5- and 10-gram added sugar thresholds following the introduction of the table-format FOP label. Although we detect a modest substitution pattern beginning around 7.5 grams of added sugar, the magnitude is economically small and unlikely to meaningfully affect diet-related health outcomes. To rationalize these limited effects, we develop and estimate a structural Berry–Levinsohn–Pakes (BLP) demand model augmented with a rational inattention framework in which information processing costs enter utility directly. We allow the cost of processing nutritional information to vary by label format, with the highest cost associated with table-format labels, followed by letter-grade labels, color-grade labels, and the lowest cost for warning labels. Structural estimates indicate that high information-processing costs substantially attenuate the effectiveness of table-format labels. Counterfactual simulations show that simplified formats—particularly warning labels—significantly reduce demand for high-sugar cereals and generate welfare gains. Overall, our findings suggest that reducing cognitive costs through simplified FOP designs can meaningfully improve consumer welfare and shift consumption away from unhealthy products."
  job_market_paper: true
  tags: ["health economics", "industrial organization", "information asymmetry"]

