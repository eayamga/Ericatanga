- title: "Do Front-of-Package Sugar Labels Shift Consumer Demand away from Diabetes-Risk Foods"
  authors: ["Eric Ayamga"]
  year: 2025
  status: "working paper"
  venue: ""
  pdf: ""
  link: "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5784502"
  abstract: "This paper evaluates the impact of a U.S. front-of-package (FOP) sugar labeling policy on consumer demand for ready-to-eat (RTE) cereals. Using NielsenIQ retail scanner data and a difference-in-differences design, we find no evidence of product reformulation or significant demand shifts around the 5- and 10-gram added sugar thresholds following the introduction of the table-format FOP label. Although we detect a modest substitution pattern beginning around 7.5 grams of added sugar, the magnitude is economically small and unlikely to meaningfully affect diet-related health outcomes. To rationalize these limited effects, we develop and estimate a structural Berry–Levinsohn–Pakes (BLP) demand model augmented with a rational inattention framework in which information processing costs enter utility directly. We allow the cost of processing nutritional information to vary by label format, with the highest cost associated with table-format labels, followed by letter-grade labels, color-grade labels, and the lowest cost for warning labels. Structural estimates indicate that high information-processing costs substantially attenuate the effectiveness of table-format labels. Counterfactual simulations show that simplified formats—particularly warning labels—significantly reduce demand for high-sugar cereals and generate welfare gains. Overall, our findings suggest that reducing cognitive costs through simplified FOP designs can meaningfully improve consumer welfare and shift consumption away from unhealthy products."
  job_market_paper: true
  tags: ["health economics", "industrial organization", "information asymmetry"]

- title: "The Cost of Inaccessibility: Retail Discrimination and Mobility-Constrained Consumers"
  authors: ["Eric Ayamga", "Li Zeng", "Victoria Hang"]
  year: 2025
  status: "working paper"
  venue: ""
  pdf: ""
  link: "https://ssrn.com/abstract=5496018"
  abstract: "Retail prices are increasingly accessed through digital platforms, yet not all consumers benefit equally. While prior research identifies price disparities across consumer groups, less is known about how such disparities arise and whether digital retail mitigates or reproduces them. This study examines mobility constraints associated with health conditions and physical limitations as an underexplored source of unequal price access. Using transaction-level data from both offline (NielsenIQ) and online (Open E-Commerce 1.0), we compare price outcomes between mobility-constrained and non-constrained consumers. We adopt a decomposition-based approach that distinguishes between differences driven by product selection and those that persist beyond selection effects. We find that mobility-constrained consumers pay higher prices on average in both settings, while within-product disparities are more persistent in the online environment. While part of the difference is explained by product choice, a meaningful gap remains among comparable purchases, suggesting unequal access to favorable prices. These findings contribute to research on digital inequality and retail information systems by identifying mobility constraints as a distinct source of price inequality and by showing that digital access does not necessarily translate into equal access to favorable prices."
  job_market_paper: false
  tags: ["industrial organization", "health economics"]

- title: "Hotter Days, Sweet Choices: Temperature Extremes and Nutritional Demand"
  authors: ["Eric Ayamga"]
  year: 2025
  status: "working paper"
  venue: ""
  pdf: ""
  link: ""
  abstract: "This paper examines the impact of extreme heat exposure on consumer demand for added sugars.
Motivated by growing concerns about the interaction between climate change and public health, I
investigate whether increases in the number of extremely hot days causally affect dietary choices.
Using high-frequency retail scanner data combined with detailed local weather information, I
construct measures of extreme heat exposure based on the number of days exceeding location specific temperature thresholds. Exploiting plausibly exogenous variation in temperature across
time and space, I estimate the effect of extreme heat on purchases of sugar-intensive products
within a panel data framework that controls for product, location, and time fixed effects. The
results show that an increase in the number of extreme hot days leads to a statistically and
economically significant rise in the demand for added sugars. The effect is nonlinear, with stronger responses observed at higher temperature thresholds and during prolonged heat episodes. These findings have important implications for both climate policy and public health."
  job_market_paper: false
  tags: ["health economics", "climate"]

